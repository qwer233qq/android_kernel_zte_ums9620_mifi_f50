name: Build ZTE F50 Kernel with Droidspaces

on:
  workflow_dispatch:
    inputs:
      ksu_version:
        description: 'KernelSU version (optional)'
        required: false
        default: ''
      build_droidspaces:
        description: 'Enable Droidspaces configs'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build ZTE F50 Kernel
    runs-on: ubuntu-22.04

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: enceka/android_kernel_zte_ums9620_mifi_f50
          ref: main
          path: kernel-source
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang-14 lld make git python3 bc flex bison ccache libelf-dev pahole openssl libssl-dev perl zstd binutils ncurses-dev libncurses5-dev libncursesw5-dev
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-14 100
          sudo update-alternatives --install /usr/bin/llvm-ar llvm-ar /usr/bin/llvm-ar-14 100
          sudo update-alternatives --install /usr/bin/llvm-nm llvm-nm /usr/bin/llvm-nm-14 100
          sudo update-alternatives --install /usr/bin/llvm-objcopy llvm-objcopy /usr/bin/llvm-objcopy-14 100
          sudo update-alternatives --install /usr/bin/llvm-objdump llvm-objdump /usr/bin/llvm-objdump-14 100
          sudo update-alternatives --install /usr/bin/llvm-readelf llvm-readelf /usr/bin/llvm-readelf-14 100

      - name: Download AOSP Clang toolchain
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains
          # Download AOSP Clang r416183b (for Android 12 / kernel 5.4)
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r416183b.tar.gz -O clang.tar.gz ||           wget -q https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/416183b/clang-llvm-14.0.6-416183b.tar.gz -O clang.tar.gz
          tar -xzf clang.tar.gz -C clang-r416183b --strip-components=1 || tar -xzf clang.tar.gz
          echo "CLANG_PATH=$HOME/toolchains/clang-r416183b/bin" >> $GITHUB_ENV

      - name: Download AOSP GCC toolchain
        run: |
          cd $HOME/toolchains
          # AOSP GCC 4.9 for aarch64
          wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/master.tar.gz -O gcc-aarch64.tar.gz ||           wget -q https://github.com/Neutron-Toolchains/gcc-arm64-catalogue/releases/download/4.9/aarch64-linux-android-4.9.tar.gz -O gcc-aarch64.tar.gz
          tar -xzf gcc-aarch64.tar.gz -C gcc-aarch64 --strip-components=1 || tar -xzf gcc-aarch64.tar.gz
          echo "GCC_AARCH64_PATH=$HOME/toolchains/gcc-aarch64/bin" >> $GITHUB_ENV

      - name: Download AOSP GCC arm32 toolchain
        run: |
          cd $HOME/toolchains
          wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/master.tar.gz -O gcc-arm.tar.gz ||           wget -q https://github.com/Neutron-Toolchains/gcc-arm-catalogue/releases/download/4.9/arm-linux-androideabi-4.9.tar.gz -O gcc-arm.tar.gz
          tar -xzf gcc-arm.tar.gz -C gcc-arm --strip-components=1 || tar -xzf gcc-arm.tar.gz
          echo "GCC_ARM_PATH=$HOME/toolchains/gcc-arm/bin" >> $GITHUB_ENV

      - name: Setup AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git $HOME/AnyKernel3

      - name: Apply Droidspaces configs (GKI safe)
        if: github.event.inputs.build_droidspaces == 'true'
        run: |
          cd kernel-source
          # For GKI kernel 5.4, only add kABI-safe configs
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'

          # Droidspaces GKI-safe configs
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_IPC_NS=y
          CONFIG_PID_NS=y
          CONFIG_DEVTMPFS=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          EOF

          # Also update f50_defconfig if needed (it inherits from gki_defconfig)
          # But for GKI, the base is gki_defconfig
          echo "Droidspaces configs applied to gki_defconfig"

      - name: Apply KernelSU (optional)
        if: github.event.inputs.ksu_version != ''
        run: |
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s ${{ github.event.inputs.ksu_version }}

      - name: Build kernel
        run: |
          cd kernel-source
          export PATH=$CLANG_PATH:$GCC_AARCH64_PATH:$GCC_ARM_PATH:$PATH
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1

          # Generate config using f50_defconfig (which uses gki_defconfig as base)
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- f50_defconfig

          # Build kernel
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- -j$(nproc) 2>&1 | tee build.log

      - name: Check build output
        run: |
          ls -la kernel-source/out/arch/arm64/boot/
          file kernel-source/out/arch/arm64/boot/Image || true
          file kernel-source/out/arch/arm64/boot/Image.gz || true

      - name: Package with AnyKernel3
        run: |
          cd $HOME/AnyKernel3
          # Copy kernel image
          cp kernel-source/out/arch/arm64/boot/Image.gz $HOME/AnyKernel3/
          # Copy dtb if exists
          cp kernel-source/out/arch/arm64/boot/dts/sprd/*.dtb $HOME/AnyKernel3/ 2>/dev/null || true

          # Create anykernel.sh for ZTE F50
          cat > anykernel.sh << 'EOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers

          properties() { '
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=f50
          device.name2=ums9620
          device.name3=9050N
          device.name4=MU300
          supported.versions=12 - 13
          supported.patchlevels=2024-01 - 2025-01
          '; }

          block=boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          EOF

          # Zip it
          zip -r9 $HOME/ZTE_F50_Droidspaces_Kernel.zip * -x .git README.md *placeholder

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZTE-F50-Kernel
          path: |
            kernel-source/out/arch/arm64/boot/Image*
            kernel-source/out/arch/arm64/boot/dts/sprd/*.dtb
            $HOME/ZTE_F50_Droidspaces_Kernel.zip
          if-no-files-found: warn

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: ZTE F50 Droidspaces Kernel Build ${{ github.run_number }}
          body: |
            ZTE F50 (UMS9620) Kernel Build
            - Android 12/13 compatible
            - Droidspaces configs enabled (GKI-safe)
            - Kernel version: 5.4.210
            - Build date: ${{ github.event.head_commit.timestamp }}
          files: |
            $HOME/ZTE_F50_Droidspaces_Kernel.zip
            kernel-source/out/arch/arm64/boot/Image.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
